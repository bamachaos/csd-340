<!DOCTYPE html>
<html lang="en">
<head>

	<title>CSD 340 Web Development with HTML and CSS</title>

	<script>

		let todoList = [];

		function addItem() {

		let item = document.getElementById("todoInput").value;

		if(item === ""){
			alert("Please enter something.");
			return;
		}

		todoList.push(item);

		alert(item + " was added.");

		document.getElementById("todoInput").value = "";

		displayList();
		}

		function deleteLast() {

		if(todoList.length === 0){
			alert("List is empty.");
			return;
		}

		let removed = todoList.pop();

		alert(removed + " was deleted.");

		displayList();
		}

		function sortList() {

		todoList.sort();

		alert("The list has been sorted.");

		displayList();
		}

		function displayList() {

		let display = "";

		for(let i = 0; i < todoList.length; i++){
			display += (i + 1) + ". " + todoList[i] + "<br>";
		}

			document.getElementById("displayArea").innerHTML = display;
		}

	</script>

</head>

<body>

	<h1>Assignment 11.2: JavaScript - Part 3</h1>

	<p>Enter something you need to do:</p>

	<input type="text" id="todoInput">

	<br><br>

	<button onclick="addItem()">Add</button>

	<button onclick="deleteLast()">Delete Last Entry</button>

	<button onclick="sortList()">Sort</button>

	<h2>Things To Do:</h2>

	<div id="displayArea"></div>

</body>

</html>
